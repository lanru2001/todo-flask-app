# ============================================================
# .github/workflows/build.yml
# Build Docker images and push to AWS ECR
# Triggered on push to main or develop (after CI passes)
# ============================================================

name: Build & Push to ECR

on:
  push:
    branches: [main, develop]

env:
  ECR_BACKEND:  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/todo-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/todo-frontend
  ECR_DATABASE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/todo-database
  IMAGE_TAG:    ${{ github.sha }}

jobs:

  build-and-push:
    name: Build & Push — All Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for REPO in todo-backend todo-frontend todo-database; do
            aws ecr describe-repositories --repository-names $REPO 2>/dev/null || \
            aws ecr create-repository \
              --repository-name $REPO \
              --image-scanning-configuration scanOnPush=true \
              --region ${{ secrets.AWS_REGION }}
          done

      - name: Build & push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_BACKEND }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: REACT_APP_API_URL=/api
          tags: |
            ${{ env.ECR_FRONTEND }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_FRONTEND }}:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Build & push — Database
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: |
            ${{ env.ECR_DATABASE }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_DATABASE }}:latest
          cache-from: type=gha,scope=database
          cache-to:   type=gha,scope=database,mode=max

      - name: Summary
        run: |
          echo "✅ Images pushed — tag: ${{ env.IMAGE_TAG }}"
          echo "   Branch : ${{ github.ref_name }}"
          echo "   Actor  : ${{ github.actor }}"
