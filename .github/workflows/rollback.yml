# ============================================================
# .github/workflows/rollback.yml
# Manual emergency rollback for production
# Trigger: Actions tab → "Rollback Production" → Run workflow
# ============================================================

name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for rollback"
        required: true
        type: string

jobs:
  rollback:
    name: Rollback — Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Rollback deployments
        run: |
          kubectl rollout undo deployment/todo-backend  -n todo-app
          kubectl rollout undo deployment/todo-frontend -n todo-app

      - name: Wait for rollback
        run: |
          kubectl rollout status deployment/todo-backend  -n todo-app --timeout=120s
          kubectl rollout status deployment/todo-frontend -n todo-app --timeout=120s

      - name: Summary
        run: |
          echo "⏪ Rollback complete"
          echo "   Reason  : ${{ github.event.inputs.reason }}"
          echo "   Actor   : ${{ github.actor }}"
          kubectl get pods -n todo-app
