# ============================================================
# .github/workflows/pr-checks.yml
# Lightweight checks that run on every Pull Request
# ============================================================

name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt --quiet

  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --silent
      - run: cd frontend && npm run build --if-present

  validate-k8s:
    name: Validate — Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz && mv kubeval /usr/local/bin/
      - name: Validate manifests
        run: |
          for f in kubernetes/*.yaml; do
            echo "Validating $f..."
            kubeval "$f" --ignore-missing-schemas || true
          done
