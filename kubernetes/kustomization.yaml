apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-app

resources:
  - 00-namespace.yaml
  - 01-secrets.yaml
  - 02-postgres.yaml
  - 03-backend.yaml
  - 04-frontend.yaml
  - 05-ingress.yaml

# Override image tags at deploy time:
# kustomize edit set image todo-backend=<ECR_URL>:<TAG>
images:
  - name: todo-backend
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/todo-backend
    newTag: latest
  - name: todo-frontend
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/todo-frontend
    newTag: latest
