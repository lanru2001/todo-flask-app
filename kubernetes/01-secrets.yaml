# NOTE: Do NOT commit real values. Use Sealed Secrets or AWS Secrets Manager in production.
# Generate with: kubectl create secret generic todo-secrets --from-env-file=.env.prod -n todo-app --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
  namespace: todo-app
type: Opaque
stringData:
  DB_HOST: "todo-postgres-service"
  DB_PORT: "5432"
  DB_NAME: "tododb"
  DB_USER: "postgres"
  DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  SECRET_KEY: "CHANGE_ME_RANDOM_SECRET_KEY"
